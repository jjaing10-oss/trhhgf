<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KT M&S Executive Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<header class="header">
  <div class="title">KT M&S Executive Dashboard</div>
  <div class="month" id="monthLabel">2026.01</div>
</header>

<section class="kpi-grid">
  <div class="kpi-card">
    <div class="kpi-title">매출</div>
    <div class="kpi-num" id="rev">-</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-title">영업이익</div>
    <div class="kpi-num" id="op">-</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-title">영업이익률</div>
    <div class="kpi-num" id="margin">-</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-title">평균 KPI</div>
    <div class="kpi-num" id="kpi">-</div>
  </div>
</section>

<section class="panel">
  <h3>AI Briefing</h3>
  <div id="aiBrief"></div>
</section>

<section class="panel">
  <h3>Top Issue</h3>
  <ul id="topIssue"></ul>
</section>

<section class="panel">
  <h3>Shortcut</h3>
  <div class="shortcuts">
    <button>BM 손익</button>
    <button>KPI 분석</button>
    <button>가입자 분석</button>
    <button>수수료 분석</button>
  </div>
</section>

</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
